name: Deploy Paper to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - '.github/workflows/deploy-paper.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build HTML
        run: make html
        working-directory: paper

      - name: Assemble site
        run: |
          mkdir -p _site
          cp paper/main.html _site/index.html
          cp paper/style.css _site/style.css

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
