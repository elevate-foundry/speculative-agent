# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy Paper to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - 'eval_suite.py'
      - 'compliance.py'
      - '.github/workflows/deploy-paper.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pandoc and tectonic
        run: |
          sudo apt-get install -y pandoc
          curl --proto '=https' --tlsv1.2 -fsSL \
            https://drop.rizin.re/tectonic/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache tectonic package bundle
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: tectonic-${{ hashFiles('paper/main.tex') }}
          restore-keys: tectonic-

      - name: Run eval suite — patch paper + generate eval page
        run: python eval_suite.py --quiet --html --patch-paper

      - name: Build paper HTML
        run: make html
        working-directory: paper

      - name: Build paper PDF
        run: tectonic main.tex
        working-directory: paper

      - name: Assemble site
        run: |
          mkdir -p _site/eval
          cp paper/main.html _site/index.html
          cp paper/style.css _site/style.css
          cp paper/main.pdf  _site/paper.pdf
          cp eval/index.html _site/eval/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
