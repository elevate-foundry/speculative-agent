<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  <!-- 8-dot Braille cell — all dots raised (⠿ + dots 7/8) = "fully compliant" indicator -->
  <!-- Left column: dots 1,2,3,7 -->
  <circle cx="10" cy="7"  r="3.2" fill="#e2b96f"/>
  <circle cx="10" cy="14" r="3.2" fill="#e2b96f"/>
  <circle cx="10" cy="21" r="3.2" fill="#e2b96f"/>
  <circle cx="10" cy="28" r="3.2" fill="#e2b96f"/>
  <!-- Right column: dots 4,5,6,8 -->
  <circle cx="22" cy="7"  r="3.2" fill="#e2b96f"/>
  <circle cx="22" cy="14" r="3.2" fill="#e2b96f"/>
  <circle cx="22" cy="21" r="3.2" fill="#e2b96f"/>
  <circle cx="22" cy="28" r="3.2" fill="#e2b96f"/>
</svg>
