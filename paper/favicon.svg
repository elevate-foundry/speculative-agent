<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>
  <!-- Hexagon (flat-top, centered at 16,16, radius 12) -->
  <!-- vertices: 0°,60°,120°,180°,240°,300° offset by 30° for pointy-top -->
  <!-- pointy-top hex, r=12: angles 90,150,210,270,330,30 -->
  <polygon
    points="16,4 26.39,10 26.39,22 16,28 5.61,22 5.61,10"
    fill="none"
    stroke="#58a6ff"
    stroke-width="1.5"
    stroke-linejoin="round"/>
  <!-- Inner lattice cross — tropical ⊕=min, ⊗=+ axes -->
  <!-- vertical axis -->
  <line x1="16" y1="4"  x2="16" y2="28" stroke="#58a6ff" stroke-width="0.75" opacity="0.35"/>
  <!-- left-diagonal -->
  <line x1="5.61" y1="10" x2="26.39" y2="22" stroke="#58a6ff" stroke-width="0.75" opacity="0.35"/>
  <!-- right-diagonal -->
  <line x1="26.39" y1="10" x2="5.61" y2="22" stroke="#58a6ff" stroke-width="0.75" opacity="0.35"/>
  <!-- Center node -->
  <circle cx="16" cy="16" r="2.2" fill="#58a6ff"/>
  <!-- 6 vertex nodes -->
  <circle cx="16"    cy="4"  r="1.3" fill="#3fb950"/>
  <circle cx="26.39" cy="10" r="1.3" fill="#3fb950"/>
  <circle cx="26.39" cy="22" r="1.3" fill="#3fb950"/>
  <circle cx="16"    cy="28" r="1.3" fill="#3fb950"/>
  <circle cx="5.61"  cy="22" r="1.3" fill="#3fb950"/>
  <circle cx="5.61"  cy="10" r="1.3" fill="#3fb950"/>
</svg>
